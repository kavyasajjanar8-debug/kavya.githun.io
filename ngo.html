<!DOCTYPE html>
<html>
<head>
    <title>NGO</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="navbar">Available Food 🤝</div>

<div class="container">

{% if foods %}
    {% for item in foods %}
        <div class="card">
            <h3>{{ item.restaurant }}</h3>
            <p>🍛 {{ item.food }}</p>
            <p>Quantity: {{ item.quantity }}</p>
            <p>📍 {{ item.location }}</p>
            <p>Impact: {{ item.impact }}</p>

            <span class="badge">{{ item.badge }}</span>

            <p>💡 {{ item.suggestion }}</p>
        </div>
    {% endfor %}
{% else %}
    <p>No food available 😔</p>
{% endif %}

<a href="/">⬅ Back</a>

</div>

</body>
</html>
